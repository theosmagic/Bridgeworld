# Secrets: `docker pass set bridgeworld/postgres/password=...` (Docker Desktop keychain)
# Run via: `./scripts/indexer-up.sh`  (uses context desktop-linux, not DOCKER_HOST remote)
# Optional profiles: monitoring | addons

services:
  postgres:
    image: postgres:15-alpine
    container_name: bridgeworld-postgres
    init: true
    command:
      - postgres
      - -cshared_preload_libraries=pg_stat_statements
      - -cmax_connections=200
    environment:
      POSTGRES_USER: se://bridgeworld/postgres/user
      POSTGRES_PASSWORD: se://bridgeworld/postgres/password
      POSTGRES_DB: graph-node
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${BRIDGEWORLD_PG_INIT:-${HOME}/.docker/bridgeworld/postgres-init}:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graph-node"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bridgeworld

  ipfs:
    image: ipfs/kubo:latest
    container_name: bridgeworld-ipfs
    init: true
    ports:
      - "5001:5001"
      - "8081:8080"   # host 8080 often taken (Covenant MCP, etc.)
      - "4001:4001"
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      IPFS_PROFILE: server
    networks:
      - bridgeworld
    healthcheck:
      test: ["CMD", "ipfs", "swarm", "peers"]
      interval: 10s
      timeout: 5s
      retries: 5

  graph-node:
    image: graphprotocol/graph-node:v0.36.0
    container_name: bridgeworld-graph-node
    init: true
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      postgres_host: postgres
      postgres_user: se://bridgeworld/postgres/user
      postgres_pass: se://bridgeworld/postgres/password
      postgres_db: graph-node
      ipfs: 'ipfs:5001'
      # Multi-chain (abstract + arbitrum-one) via config file; `ethereum` env only supports one pair
      GRAPH_NODE_CONFIG: /etc/graph-node/config.toml
      GRAPH_LOG: info
      GRAPH_ALLOW_NON_DETERMINISTIC_IPFS: "true"
    volumes:
      - ./docker/graph-node-config.toml:/etc/graph-node/config.toml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
      # Host 1802x — avoids Covenant observatory/docs/governor on 8020–8040
      - "18020:8020"
      - "18030:8030"
      - "18040:8040"
    depends_on:
      postgres:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    networks:
      - bridgeworld
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/graphql?query={_meta{block{number}}}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Optional: Prometheus for monitoring (Graph Node exports metrics on :9090)
  # Local chain RPC bridge (Hardhat/Anvil on host) — enable: COMPOSE_PROFILES=addons ./scripts/indexer-up.sh
  local-rpc-proxy:
    image: alpine/socat:latest
    container_name: bridgeworld-local-rpc
    init: true
    profiles:
      - addons
    command: TCP-LISTEN:8545,fork,reuseaddr TCP:host.docker.internal:8545
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - bridgeworld

  prometheus:
    image: prom/prometheus:latest
    container_name: bridgeworld-prometheus
    init: true
    volumes:
      - ${BRIDGEWORLD_PROMETHEUS_CFG:-${HOME}/.docker/bridgeworld/prometheus.yml}:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - bridgeworld
    depends_on:
      - graph-node
    profiles:
      - monitoring

volumes:
  postgres_data:
  ipfs_data:
  prometheus_data:

networks:
  bridgeworld:
    driver: bridge
