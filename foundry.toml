[profile.default]
src      = "contracts"
out      = "out"
libs     = ["lib"]
auto_detect_solc = true
optimizer        = true
optimizer_runs   = 200
via_ir           = false
evm_version      = "paris"

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
  "@solidstate/contracts/=lib/solidstate-solidity/contracts/",
  "forge-std/=lib/forge-std/src/"
]

# Cycle 1: Harvester staking infrastructure (0.8.13 contracts, OZ 4.x)
[profile.cycle1]
src              = "contracts/harvester"
script           = "contracts/script/harvester"
out              = "out"
libs             = ["lib"]
solc             = "0.8.13"
optimizer        = true
optimizer_runs   = 200
via_ir           = false
evm_version      = "paris"
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts-v4/contracts/",
  "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
  "@solidstate/contracts/=lib/solidstate-solidity/contracts/",
  "forge-std/=lib/forge-std/src/"
]

# TreasureDiamond + all game facets (OZ 5.x, solc 0.8.20)
[profile.diamond]
src              = "contracts/diamond"
script           = "contracts/script/diamond"
out              = "out"
libs             = ["lib"]
solc             = "0.8.20"
optimizer        = true
optimizer_runs   = 200
via_ir           = true
evm_version      = "paris"
fs_permissions   = [{ access = "write", path = "safe-tx/" }]
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]

# Game facets: Golem, Legion, ArmyGirls, FishFrenzy — OZ 5.x, scoped away from legacy harvester
[profile.facets]
src              = "contracts/facets"
out              = "out"
libs             = ["lib"]
solc             = "0.8.20"
optimizer        = true
optimizer_runs   = 200
via_ir           = true
evm_version      = "paris"
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]

# Scoped profile for SAOLClaim deploy — avoids legacy contract compile errors
[profile.claim]
src              = "contracts/claim"
script           = "contracts/script"
out              = "out"
libs             = ["lib"]
solc             = "0.8.20"
optimizer        = true
optimizer_runs   = 200
via_ir           = false
evm_version      = "paris"
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
abstract   = "https://api.mainnet.abs.xyz"
base       = "https://mainnet.base.org"
arbitrum   = "https://arb1.arbitrum.io/rpc"
ethereum   = "https://eth.llamarpc.com"

[etherscan]
abstract = { key = "${ABSCAN_API_KEY}", url   = "https://api.abscan.org/api", chain = 2741 }
base     = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }
