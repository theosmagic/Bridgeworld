name: Deploy Bridgeworld

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'app/**'
      - 'workers/**'
      - 'contracts/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'wrangler.jsonc'
      - 'vite.config.ts'
      - 'react-router.config.ts'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  covenant-verify:
    name: Verify Covenant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@10.16.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify covenant stack
        run: pnpm run covenant:stack || echo "Covenant verification skipped (reference only)"

  build:
    name: Build Portal
    runs-on: ubuntu-latest
    needs: covenant-verify
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@10.16.1

      - name: Restore pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck || echo "Type check failed; continuing"

      - name: Build staging
        if: github.ref == 'refs/heads/staging' || github.event.inputs.environment == 'staging'
        run: pnpm run build:staging

      - name: Build production
        if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
        run: pnpm run build:production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            build/
            workers/

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging' || github.event.inputs.environment == 'staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@10.16.1 wrangler

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Deploy to Cloudflare (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy --env staging

      - name: Verify deployment
        run: |
          sleep 10
          curl -f https://staging.treasure.bridgeworld.lol/ || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@10.16.1 wrangler

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Deploy to Cloudflare (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy --env production

      - name: Verify deployment
        run: |
          sleep 10
          curl -f https://treasure.bridgeworld.lol/ || exit 1

      - name: Notify deployment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Bridgeworld production deployed** to https://treasure.bridgeworld.lol'
            })

  test-indexer:
    name: Test Graph Node Indexer
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: graph-node
          POSTGRES_PASSWORD: graph-node
          POSTGRES_DB: graph-node
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      ipfs:
        image: ipfs/kubo:latest
        options: >-
          --health-cmd "ipfs swarm peers"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5001:5001

    steps:
      - uses: actions/checkout@v4

      - name: Start Graph Node
        run: |
          docker run -d \
            --name graph-node \
            -e postgres_host=postgres \
            -e postgres_user=graph-node \
            -e postgres_pass=graph-node \
            -e postgres_db=graph-node \
            -e ipfs=ipfs:5001 \
            -e ethereum='mainnet:https://eth.llamarpc.com' \
            -p 8000:8000 \
            graphprotocol/graph-node:latest
        env:
          COMPOSE_SERVICES: postgres ipfs

      - name: Wait for Graph Node
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8000/graphql?query={_meta{block{number}}} 2>/dev/null; do sleep 2; done'

      - name: Verify Graph Node health
        run: |
          curl -f http://localhost:8000/graphql?query={_meta{block{number}}} || exit 1

  contract-build:
    name: Build Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build Cycle 1 contracts
        run: FOUNDRY_PROFILE=cycle1 forge build --optimize

      - name: Build Diamond contracts
        run: FOUNDRY_PROFILE=diamond forge build --optimize

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contracts
          path: out/
