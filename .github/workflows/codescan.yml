# CodeScan + Snowflake SAM account API health check.
# CODESCAN secrets optional: analysis continues-on-error when CODESCAN_AUTH_TOKEN is unset.
name: CodeScan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '16 21 * * 0'

permissions:
  contents: read

jobs:
    CodeScan:
        permissions:
          contents: read
          security-events: write
          actions: read
        runs-on: ubuntu-latest
        env:
          SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT || 'SAM-390cc0a6-bbd1-4390-940e-98de8d4ec91f' }}
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
            -   name: Snowflake SAM API ping
                env:
                    SNOWFLAKE_PAT: ${{ secrets.SNOWFLAKE_PAT }}
                run: bash scripts/snowflake-sam-api-ping.sh
                continue-on-error: true
            -   name: Set up Java 17
                id: setup-java
                uses: actions/setup-java@v4
                with:
                    distribution: temurin
                    java-version: '17'
            -   name: Cache files
                uses: actions/cache@v3
                with:
                    path: |
                        ~/.sonar
                    key: ${{ runner.os }}-sonar
                    restore-keys: ${{ runner.os }}-sonar
            -   name: Run Analysis
                uses: codescan-io/codescan-scanner-action@5b2e8c5683ef6a5adc8fa3b7950bb07debccce12
                env:
                    JAVA_HOME: ${{ steps.setup-java.outputs.path }}
                    SONAR_SCANNER_OPTS: '-Djava.awt.headless=true'
                with:
                    login: ${{ secrets.CODESCAN_AUTH_TOKEN }}
                    organization: ${{ secrets.CODESCAN_ORGANIZATION_KEY }}
                    projectKey: ${{ secrets.CODESCAN_PROJECT_KEY }}
                continue-on-error: ${{ secrets.CODESCAN_AUTH_TOKEN == '' }}
            -   name: Upload SARIF file
                if: hashFiles('codescan.sarif') != ''
                uses: github/codeql-action/upload-sarif@v3
                with:
                    sarif_file: codescan.sarif
                continue-on-error: ${{ secrets.CODESCAN_AUTH_TOKEN == '' }}
