[profile.default]
src             = "src"
script          = "script"
out             = "out"
libs            = ["lib"]
solc            = "0.8.20"
optimizer       = true
optimizer_runs  = 200
evm_version     = "paris"

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
base     = "https://mainnet.base.org"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
